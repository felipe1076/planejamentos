<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Planejamento SEMED - Altos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 1. IDENTIFICAÇÃO E CABEÇALHO (Official Theme) -->
        <header class="main-header official">
            <div class="header-logo-container">
                <div class="logo-wrapper">
                    <img src="semed_altos_logo.svg" alt="SEMED Altos Logo" class="header-logo" id="logo-semed">
                    <input type="file" id="upload-logo-semed" accept="image/*" style="display: none;">
                    <label for="upload-logo-semed" class="change-logo-btn">Trocar Logo</label>
                </div>
                <div class="header-titles official-titles">
                    <h2>SECRETARIA MUNICIPAL DE EDUCAÇÃO - SEMED</h2>
                    <h3>COORDENAÇÃO DE ENSINO 6º AO 9º ANO</h3>
                    <h4>COMPONENTE CURRICULAR: <input type="text" id="componente" value="PROJETOS INTEGRADORES" placeholder="Componente Curricular"></h4>
                </div>
                <div class="logo-wrapper">
                    <img src="zeca_marinha_logo.svg" alt="Escola Zeca da Marinha Logo" class="header-logo" id="logo-escola">
                    <input type="file" id="upload-logo-escola" accept="image/*" style="display: none;">
                    <label for="upload-logo-escola" class="change-logo-btn">Trocar Logo</label>
                </div>
            </div>
            
            <div class="banners-section">
                <div class="green-banner">
                    <input type="text" id="planejamento-titulo" value="I PLANEJAMENTO MENSAL PROJETOS INTEGRADORES DO 6º AO 9º ANO">
                    <input type="text" id="periodo" value="PERÍODO: 09/02 A 23/03 DE 2026">
                </div>
                <div class="green-banner eixo-banner">
                    <label>EIXO INTEGRADOR - </label>
                    <input type="text" id="eixo" value="Perfil do Estudante: Identidade, Pertencimento, Convivência e Organização da Vida Escolar">
                </div>
                <div class="blue-banner formador-row">
                    <div class="form-item">
                        <label>FORMADOR:</label>
                        <input type="text" id="coordenador" value="Elizete Nunes da Silva">
                    </div>
                    <div class="form-item">
                        <label>PROFESSOR:</label>
                        <input type="text" id="professor" placeholder="Nome do Professor">
                    </div>
                    <div class="form-item">
                        <label>TURMA(S):</label>
                        <input type="text" id="turmas" placeholder="Ex: 6º AO 9º ANO">
                    </div>
                </div>
            </div>
        </header>

        <main class="content-wrapper">
            <!-- 2. TABELA DE PLANEJAMENTO SEMANAL -->
            <section class="card table-builder-section" id="planejamento">
                <div class="card-header">
                    <span class="icon">📅</span>
                    <h2>Planejamento Semanal</h2>
                    <button id="add-week-btn" class="btn btn-secondary">
                        <span class="btn-icon">+</span> Adicionar Semana
                    </button>
                </div>
                
                <div id="weeks-container" class="weeks-list">
                    <!-- Week blocks added via JS -->
                </div>
            </section>

            <!-- 4. AÇÃO DO BOTÃO -->
            <div class="action-container grid-buttons">
                <button id="gerar-pdf-btn" class="btn-main">
                    <span class="btn-icon">📄</span> GERAR PDF OFICIAL
                </button>
                <button id="gerar-word-btn" class="btn-main word">
                    <span class="btn-icon">📝</span> GERAR WORD (DOC)
                </button>
            </div>

            <div class="data-actions">
                <button id="exportar-btn" class="btn-data">
                    <span class="btn-icon">📤</span> Exportar Backup
                </button>
                <button id="importar-btn" class="btn-data">
                    <span class="btn-icon">📥</span> Importar Backup
                </button>
                <input type="file" id="importar-input" accept=".json" style="display: none;">
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; 2026 SEMED Altos. Todos os direitos reservados.</p>
        </footer>
    </div>

    <template id="week-template">
        <div class="week-block">
            <div class="week-header">
                <h3>Semana <span class="week-num">1</span></h3>
                <button class="remove-week-btn" title="Remover">×</button>
            </div>
            <div class="week-grid">
                <div class="form-group row">
                    <div class="col section-label">
                        <label>DESCRIÇÃO</label>
                        <input type="text" class="field-semana-label" placeholder="Ex: 1ª SEMANA">
                    </div>
                    <div class="col">
                        <label>INÍCIO</label>
                        <input type="text" class="field-date-start" placeholder="Data">
                    </div>
                    <div class="col">
                        <label>FIM</label>
                        <input type="text" class="field-date-end" placeholder="Data">
                    </div>
                </div>
                <div class="form-group">
                    <label>HABILIDADES (BNCC)</label>
                    <textarea class="field-habilidades" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>OBJETIVOS</label>
                    <textarea class="field-objetivos" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>OBJETO DO CONHECIMENTO</label>
                    <textarea class="field-objetos" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>METODOLOGIA</label>
                    <textarea class="field-metodologia" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>AVALIAÇÃO</label>
                    <textarea class="field-avaliacao" rows="3"></textarea>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
