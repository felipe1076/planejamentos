<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Planejamento SEMED - Altos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 1. IDENTIFICAÇÃO E CABEÇALHO (Official Theme) -->
        <header class="main-header official">
            <div class="header-logo-container">
                <div class="logo-wrapper">
                    <img src="semed_altos_logo.svg" alt="SEMED Altos Logo" class="header-logo" id="logo-semed">
                    <input type="file" id="upload-logo-semed" accept="image/*" style="display: none;">
                    <label for="upload-logo-semed" class="change-logo-btn">Trocar Logo</label>
                </div>
                <div class="header-titles official-titles">
                    <h1>PREFEITURA MUNICIPAL DE ALTOS</h1>
                    <h2>SECRETARIA MUNICIPAL DE EDUCAÇÃO – SEMED</h2>
                    <h3>COMPONENTE CURRICULAR: <input type="text" id="componente" value="PROJETOS INTEGRADORES" placeholder="Componente Curricular"></h3>
                </div>
                <div class="logo-wrapper">
                    <img src="zeca_marinha_logo.svg" alt="Escola Zeca da Marinha Logo" class="header-logo" id="logo-escola">
                    <input type="file" id="upload-logo-escola" accept="image/*" style="display: none;">
                    <label for="upload-logo-escola" class="change-logo-btn">Trocar Logo</label>
                </div>
            </div>
            
            <div class="banners-section">
                <div class="id-row">
                    <div class="form-item">
                        <label>DURAÇÃO:</label>
                        <input type="text" id="duracao" value="60MIN.">
                    </div>
                    <div class="form-item">
                        <label>TURMA:</label>
                        <input type="text" id="turma" placeholder="Ex: 9°A">
                    </div>
                    <div class="form-item">
                        <label>TURNO:</label>
                        <input type="text" id="turno" value="INTEGRAL">
                    </div>
                </div>
                <div class="id-row">
                    <div class="form-item full">
                        <label>ESCOLA:</label>
                        <input type="text" id="escola" placeholder="Nome da Escola">
                    </div>
                </div>
                <div class="id-row">
                    <div class="form-item full">
                        <label>PROFESSOR (A):</label>
                        <input type="text" id="professor" placeholder="Nome do Professor">
                    </div>
                </div>
                <div class="blue-banner plan-title-row">
                    <span class="plan-label">- PLANO DE AULA -</span>
                    <input type="text" id="periodo-geral" value="SEMANA de 09 a 13/02 de 2026">
                </div>
            </div>
        </header>

        <main class="content-wrapper">
            <!-- 2. TABELA DE PLANEJAMENTO SEMANAL -->
            <section class="card table-builder-section" id="planejamento">
                <div class="card-header">
                    <span class="icon">📅</span>
                    <h2>Planejamento Semanal</h2>
                    <button id="add-week-btn" class="btn btn-secondary">
                        <span class="btn-icon">+</span> Adicionar Semana
                    </button>
                </div>
                
                <div id="weeks-container" class="weeks-list">
                    <!-- Week blocks added via JS -->
                </div>
            </section>

            <!-- 4. AÇÃO DO BOTÃO PRINCIPAL -->
            <div class="action-container grid-buttons">
                <button id="gerar-pdf-btn" class="btn-main">
                    <span class="btn-icon">📄</span> GERAR PDF OFICIAL
                </button>
                <button id="gerar-word-btn" class="btn-main word">
                    <span class="btn-icon">📝</span> GERAR WORD (DOC)
                </button>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-actions">
                <button id="exportar-btn" class="btn-footer" title="Exportar Backup">
                    <span class="icon">📤</span>
                </button>
                <button id="importar-btn" class="btn-footer" title="Importar Backup">
                    <span class="icon">📥</span>
                </button>
                <div class="theme-menu-container">
                    <button id="theme-btn" class="btn-footer" title="Mudar Tema">
                        <span class="icon">🎨</span>
                    </button>
                    <div id="theme-dropdown" class="theme-dropdown">
                        <button data-theme="light">Claro</button>
                        <button data-theme="dark">Escuro</button>
                        <button data-theme="blue">Azul</button>
                        <button data-theme="lilac">Lilás</button>
                    </div>
                </div>
                <input type="file" id="importar-input" accept=".json" style="display: none;">
            </div>
            <p>Sistema de Uso Aberto</p>
        </footer>
    </div>

    <template id="week-template">
        <div class="week-block">
            <div class="week-header">
                <h3>Semana <span class="week-num">1</span></h3>
                <button class="remove-week-btn" title="Remover">×</button>
            </div>
            <div class="week-grid">
                <div class="form-group row">
                    <div class="col">
                        <label>DATA/PERÍODO</label>
                        <input type="text" class="field-semana-label" placeholder="Ex: 10 a 12 de fevereiro">
                    </div>
                </div>
                <div class="form-group">
                    <label>EIXO / TEMÁTICA</label>
                    <textarea class="field-eixo" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>OBJETO DO CONHECIMENTO</label>
                    <textarea class="field-objetos" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>OBJETIVOS</label>
                    <textarea class="field-objetivos" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>ESTRATÉGIAS METODOLÓGICAS</label>
                    <textarea class="field-metodologia" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>RECURSOS</label>
                    <textarea class="field-recursos" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>ADAPTAÇÕES CURRICULARES</label>
                    <textarea class="field-adaptacoes" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>AVALIAÇÃO</label>
                    <textarea class="field-avaliacao" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>RECUPERAÇÃO</label>
                    <textarea class="field-recuperacao" rows="2"></textarea>
                </div>
            </div>
        </div>
    </template>

    <div class="floating-group">
        <button id="float-pdf-btn" class="float-btn pdf" title="Gerar PDF Oficial">
            <span class="icon">📄</span>
        </button>
        <button id="float-word-btn" class="float-btn word" title="Gerar Word (DOC)">
            <span class="icon">📝</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
